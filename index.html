<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Solar System Practical</title>
    <script src="script/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      
      <a-assets>
        <img id="sky-tex" src="texture/2k_stars_milky_way.jpg">
        <img id="sun-tex" src="texture/2k_sun.jpg">
        <img id="mercury-tex" src="texture/2k_mercury.jpg">
        <img id="venus-tex" src="texture/2k_venus_atmosphere.jpg"> 
        <img id="earth-tex" src="texture/2k_earth_daymap.jpg">
        <img id="moon-tex" src="texture/2k_moon.jpg">
        <img id="mars-tex" src="texture/2k_mars.jpg">
        <img id="jupiter-tex" src="texture/2k_jupiter.jpg">
        <img id="saturn-tex" src="texture/2k_saturn.jpg">
        <img id="saturn-ring" src="texture/2k_saturn_ring_alpha.png">
        <img id="uranus-tex" src="texture/2k_uranus.jpg">
        <img id="neptune-tex" src="texture/2k_neptune.jpg">
      </a-assets>

      <a-sky src="#sky-tex"></a-sky>

      <a-entity position="40 15 110" rotation="-5 0 0">
        <a-camera></a-camera>
      </a-entity>

      <a-sphere src="#sun-tex" position="-10 0 0" radius="8"></a-sphere>

      <a-entity position="-10 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear">
        <a-sphere src="#mercury-tex" position="12 -3 0" radius="0.6"></a-sphere>
      </a-entity>

      <a-entity position="-10 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
        <a-sphere src="#venus-tex" position="19 6 0" radius="1.2"></a-sphere>
      </a-entity>

      <a-entity position="-10 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
        <a-entity position="27 -2 0">
          <a-sphere src="#earth-tex" radius="1.3"></a-sphere>
          <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear">
             <a-sphere src="#moon-tex" position="2.2 0 0" radius="0.35"></a-sphere>
          </a-entity>
        </a-entity>
      </a-entity>

      <a-entity position="-10 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 18000; easing: linear">
        <a-sphere src="#mars-tex" position="35 -7 0" radius="0.8"></a-sphere>
      </a-entity>

      <a-entity position="-10 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 35000; easing: linear">
        <a-sphere src="#jupiter-tex" position="48 -3 0" radius="3.5"></a-sphere>
      </a-entity>

      <a-entity position="-10 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 55000; easing: linear">
        <a-entity position="63 7 0">
          <a-sphere src="#saturn-tex" radius="2.8"></a-sphere>
          <a-ring src="#saturn-ring" radius-inner="3.5" radius-outer="5.5" rotation="-70 0 0" material="transparent: true; side: double"></a-ring>
        </a-entity>
      </a-entity>

      <a-entity position="-10 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 75000; easing: linear">
        <a-sphere src="#uranus-tex" position="78 -8 0" radius="2"></a-sphere>
      </a-entity>

      <a-entity position="-10 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 95000; easing: linear">
        <a-sphere src="#neptune-tex" position="92 6 0" radius="1.9"></a-sphere>
      </a-entity>

      <a-entity position="-10 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 120000; easing: linear">
        <a-sphere src="#moon-tex" position="104 0 0" radius="0.5"></a-sphere>
      </a-entity>

    </a-scene>
  </body>
</html>
